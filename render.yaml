services:
  - type: web
    name: campus-servre-2
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm run server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PO_QR_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
